name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: swift test

  build-and-release:
    needs: test
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build app bundle
        run: APP_VERSION=${{ steps.version.outputs.version }} bash Scripts/package_app.sh

      - name: Create zip
        run: ditto -c -k --keepParent CursorMeter.app CursorMeter-${{ steps.version.outputs.version }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: CursorMeter-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
