name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: swift test

  build-and-release:
    needs: test
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build app bundle
        run: APP_VERSION=${{ steps.version.outputs.version }} bash Scripts/package_app.sh

      - name: Create zip
        run: ditto -c -k --keepParent CursorMeter.app CursorMeter-${{ steps.version.outputs.version }}.zip

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${GITHUB_REF_NAME}$" | head -1)

          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${GITHUB_REF_NAME}"
          else
            RANGE="${GITHUB_REF_NAME}"
          fi

          FEATURES=""
          FIXES=""
          OTHERS=""

          while IFS= read -r line; do
            msg="${line#* }"  # strip short hash
            case "$msg" in
              feat:*|feat\(*) FEATURES="${FEATURES}\n- ${msg}" ;;
              fix:*|fix\(*)   FIXES="${FIXES}\n- ${msg}" ;;
              *)              OTHERS="${OTHERS}\n- ${msg}" ;;
            esac
          done < <(git log --oneline "$RANGE" 2>/dev/null)

          {
            echo 'body<<BODY_EOF'
            echo "## Install"
            echo ""
            echo "### Quick Install (recommended)"
            echo '```bash'
            echo "curl -sL https://raw.githubusercontent.com/WoojinAhn/CursorMeter/main/Scripts/install.sh | bash"
            echo '```'
            echo ""
            echo "### Manual Install"
            echo "1. Download **CursorMeter-${VERSION}.zip** below"
            echo "2. Unzip the archive"
            echo '3. Remove quarantine: `xattr -cr CursorMeter.app`'
            echo '4. If upgrading, quit the running app first (menu bar → Quit)'
            echo '5. Move `CursorMeter.app` to `/Applications`'
            echo "6. Launch from Applications or Spotlight"
            echo ""
            echo "---"
            echo ""
            echo "## What's Changed"
            if [ -n "$FEATURES" ]; then
              echo ""
              echo "### New Features"
              echo -e "$FEATURES"
            fi
            if [ -n "$FIXES" ]; then
              echo ""
              echo "### Bug Fixes"
              echo -e "$FIXES"
            fi
            if [ -n "$OTHERS" ]; then
              echo ""
              echo "### Other Changes"
              echo -e "$OTHERS"
            fi
            echo 'BODY_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: CursorMeter-${{ steps.version.outputs.version }}.zip
          body: ${{ steps.notes.outputs.body }}
